name: memory-service

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    # Postgres 18 stores data under a major-version subdirectory and expects
    # the volume mounted at /var/lib/postgresql (not /var/lib/postgresql/data).
    volumes:
      - memory_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      # Defaults for compose-internal networking. Override in .env if needed.
      DATABASE_URL: ${DATABASE_URL:-postgresql://memory:memory@db:5432/memory}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD", "python", "-c",
        "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=2).status==200 else 1)"
      ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  memory_pgdata:
